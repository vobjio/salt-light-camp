<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salt & Light – Dashboard Admin</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{ --accent:#1D2D50; --primary:#EB5757; --yellow:#FDB813; --blue:#56CCF2; --bg:#FFFBEB; }
    body{ background:var(--bg); font-family:system-ui,sans-serif; }
    .stat-card{ background:white; border-radius:1.5rem; padding:1.5rem; box-shadow:0 4px 20px rgba(0,0,0,.07); border:1px solid #f0f0e8; }
    .badge{ display:inline-block; padding:.2rem .7rem; border-radius:9999px; font-size:.7rem; font-weight:700; }
    .week-bar{ height:8px; border-radius:9999px; background:var(--blue); transition:width .5s ease; }
    #loginScreen{ position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100; }
    tr:hover td{ background:#fafaf5; }
    td,th{ padding:.75rem 1rem; text-align:left; border-bottom:1px solid #f0f0e8; font-size:.85rem; }
    th{ font-weight:700; font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; color:#888; background:#fafaf5; }
    .tag{ display:inline-block;padding:.15rem .6rem;border-radius:.4rem;font-size:.7rem;font-weight:600; }
    input:focus{ outline:none; box-shadow:0 0 0 3px rgba(86,204,242,0.25); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="bg-white rounded-[2rem] shadow-2xl p-10 w-full max-w-sm border border-gray-100 text-center">
    <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background:rgba(29,45,80,.1)">
      <svg class="w-8 h-8" fill="none" stroke="var(--accent)" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2 class="text-2xl font-black uppercase tracking-tight mb-1" style="color:var(--accent)">Panel Admin</h2>
    <p class="text-gray-400 text-sm mb-6">Salt & Light Summer Camp</p>
    <input id="pwdInput" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()"
      class="w-full px-4 py-3 rounded-xl border-2 mb-3 text-sm" style="border-color:#e2e8f0"/>
    <p id="pwdError" class="text-red-500 text-xs mb-3 hidden">Contraseña incorrecta</p>
    <button onclick="login()" class="w-full py-3 rounded-xl font-bold text-white text-sm uppercase tracking-widest" style="background:var(--accent)">
      Entrar
    </button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden min-h-screen">

  <!-- HEADER -->
  <header class="text-white px-6 py-4 flex items-center justify-between shadow-lg sticky top-0 z-10" style="background:var(--accent)">
    <div class="flex items-center gap-3">
      <svg class="w-7 h-7" fill="none" stroke="var(--yellow)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2"/></svg>
      <div>
        <h1 class="font-black text-lg uppercase tracking-tighter leading-none">Salt & Light</h1>
        <p class="text-xs opacity-50 font-light">Panel de Inscripciones</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="exportCSV()" class="text-xs px-4 py-2 rounded-xl font-bold uppercase tracking-widest" style="background:var(--yellow);color:var(--accent)">⬇ Exportar CSV</button>
      <button onclick="logout()" class="text-xs px-3 py-2 rounded-xl font-bold border border-white/20 opacity-60 hover:opacity-100 transition-opacity">Salir</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">

    <!-- STATS ROW -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="stat-card">
        <p class="text-xs font-bold uppercase tracking-wider opacity-50 mb-1">Total Inscritos</p>
        <p id="statTotal" class="text-4xl font-black" style="color:var(--accent)">–</p>
      </div>
      <div class="stat-card">
        <p class="text-xs font-bold uppercase tracking-wider opacity-50 mb-1">Esta Semana</p>
        <p id="statWeek" class="text-4xl font-black" style="color:var(--primary)">–</p>
      </div>
      <div class="stat-card">
        <p class="text-xs font-bold uppercase tracking-wider opacity-50 mb-1">Niños</p>
        <p id="statBoys" class="text-4xl font-black" style="color:var(--blue)">–</p>
      </div>
      <div class="stat-card">
        <p class="text-xs font-bold uppercase tracking-wider opacity-50 mb-1">Niñas</p>
        <p id="statGirls" class="text-4xl font-black" style="color:var(--yellow)">–</p>
      </div>
    </div>

    <!-- WEEKS CHART + SCHOOLS -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="stat-card">
        <h3 class="text-sm font-black uppercase tracking-wider mb-4" style="color:var(--accent)">Inscripciones por Semana</h3>
        <div id="weeksChart" class="space-y-3"></div>
      </div>
      <div class="stat-card">
        <h3 class="text-sm font-black uppercase tracking-wider mb-4" style="color:var(--accent)">Top Colegios</h3>
        <div id="schoolsChart" class="space-y-2"></div>
      </div>
    </div>

    <!-- SEARCH + TABLE -->
    <div class="stat-card">
      <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-3 mb-5">
        <h3 class="text-sm font-black uppercase tracking-wider" style="color:var(--accent)">Lista de Inscritos</h3>
        <div class="flex gap-2 w-full md:w-auto">
          <input id="searchInput" type="text" placeholder="Buscar nombre, correo, colegio..." onkeyup="filterTable()"
            class="border-2 rounded-xl px-4 py-2 text-sm flex-1 md:w-72" style="border-color:#e2e8f0"/>
          <select id="weekFilter" onchange="filterTable()" class="border-2 rounded-xl px-3 py-2 text-sm" style="border-color:#e2e8f0">
            <option value="">Todas las semanas</option>
            <option>Semana 1</option><option>Semana 2</option><option>Semana 3</option><option>Semana 4</option><option>Semana 5</option>
          </select>
        </div>
      </div>
      <div class="overflow-x-auto rounded-xl border" style="border-color:#f0f0e8">
        <table class="w-full min-w-[900px]">
          <thead>
            <tr>
              <th>Nombre</th><th>Edad/Género</th><th>Colegio</th><th>Semanas</th><th>Contacto</th><th>Alergias</th><th>Fotos</th><th>Fecha</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" class="text-center text-gray-400 py-8">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
      <p id="tableCount" class="text-xs text-gray-400 mt-3"></p>
    </div>

  </main>
</div>

<script>
  // ===== CONFIGURATION =====
  const SUPABASE_URL = 'https://cjnrezbyhprwxwpomhad.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqbnJlemJ5aHByd3h3cG9taGFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTU2NDcsImV4cCI6MjA5MjI5MTY0N30.XGe0DdK9TfU3sL_D9RxCQsSgOlDuDW7NjogSuaM8EFI';
  const DASHBOARD_PASSWORD = 'Salt&light0501';
  // ========================

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let allData = [];

  function login(){
    const pwd = document.getElementById('pwdInput').value;
    if(pwd === DASHBOARD_PASSWORD){
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').classList.remove('hidden');
      loadData();
    } else {
      document.getElementById('pwdError').classList.remove('hidden');
      document.getElementById('pwdInput').value = '';
    }
  }

  function logout(){
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').classList.add('hidden');
    document.getElementById('pwdInput').value = '';
  }

  async function loadData(){
    const { data, error } = await supabase
      .from('inscripciones')
      .select('*')
      .order('created_at', { ascending: false });

    if(error){ console.error(error); return; }
    allData = data || [];
    renderStats(allData);
    renderTable(allData);
  }

  function renderStats(data){
    document.getElementById('statTotal').textContent = data.length;

    const now = new Date();
    const weekAgo = new Date(now - 7*24*60*60*1000);
    const thisWeek = data.filter(r => new Date(r.created_at) >= weekAgo).length;
    document.getElementById('statWeek').textContent = thisWeek;

    const boys = data.filter(r => r.gender === 'Niño').length;
    const girls = data.filter(r => r.gender === 'Niña').length;
    document.getElementById('statBoys').textContent = boys;
    document.getElementById('statGirls').textContent = girls;

    // Weeks chart
    const weeks = ['Semana 1','Semana 2','Semana 3','Semana 4','Semana 5'];
    const weekCounts = weeks.map(w => ({
      label: w,
      count: data.filter(r => (r.weeks||'').includes(w)).length
    }));
    const maxW = Math.max(...weekCounts.map(w=>w.count), 1);
    document.getElementById('weeksChart').innerHTML = weekCounts.map(w => `
      <div>
        <div class="flex justify-between mb-1">
          <span class="text-xs font-semibold">${w.label}</span>
          <span class="text-xs font-black" style="color:var(--blue)">${w.count}</span>
        </div>
        <div style="background:#f0f0e8;border-radius:9999px;height:8px">
          <div class="week-bar" style="width:${(w.count/maxW)*100}%"></div>
        </div>
      </div>
    `).join('');

    // Schools chart
    const schoolMap = {};
    data.forEach(r => { if(r.school) schoolMap[r.school] = (schoolMap[r.school]||0)+1; });
    const topSchools = Object.entries(schoolMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const maxS = Math.max(...topSchools.map(s=>s[1]), 1);
    document.getElementById('schoolsChart').innerHTML = topSchools.map(([name,count]) => `
      <div class="flex items-center gap-2">
        <span class="text-xs w-32 truncate font-medium">${name}</span>
        <div style="flex:1;background:#f0f0e8;border-radius:9999px;height:6px">
          <div style="width:${(count/maxS)*100}%;height:6px;border-radius:9999px;background:var(--primary)"></div>
        </div>
        <span class="text-xs font-black w-4" style="color:var(--primary)">${count}</span>
      </div>
    `).join('');
  }

  function renderTable(data){
    const tbody = document.getElementById('tableBody');
    if(!data.length){
      tbody.innerHTML = '<tr><td colspan="8" class="text-center text-gray-400 py-8">No hay inscripciones aún.</td></tr>';
      document.getElementById('tableCount').textContent = '';
      return;
    }
    tbody.innerHTML = data.map(r => {
      const date = new Date(r.created_at).toLocaleDateString('es-DO',{day:'2-digit',month:'short'});
      const weeks = (r.weeks||'').split(',').map(w=>w.trim()).filter(Boolean);
      const weekBadges = weeks.map(w=>`<span class="tag" style="background:rgba(86,204,242,.15);color:var(--blue)">${w.replace('Semana ','S')}</span>`).join(' ');
      const allergyColor = r.allergies ? 'background:rgba(235,87,87,.12);color:var(--primary)' : 'background:#f0f0e8;color:#888';
      return `
        <tr>
          <td><span class="font-semibold">${r.child_name||'–'}</span></td>
          <td><span class="font-medium">${r.age||'–'} / ${r.gender||'–'}<br><span class="text-xs opacity-50">${r.shirt_size||''}</span></span></td>
          <td><span class="text-sm">${r.school||'–'}<br><span class="text-xs opacity-50">${r.next_grade||''}</span></span></td>
          <td>${weekBadges||'–'}</td>
          <td><span class="text-sm">${r.phone||'–'}<br><span class="text-xs opacity-50">${r.email||''}</span></span></td>
          <td><span class="tag" style="${allergyColor}">${r.allergies||'Ninguna'}</span></td>
          <td><span class="tag" style="${r.photo_permission==='Sí'?'background:rgba(29,45,80,.1);color:var(--accent)':'background:#f0f0e8;color:#888'}">${r.photo_permission||'–'}</span></td>
          <td class="text-xs opacity-60">${date}</td>
        </tr>`;
    }).join('');
    document.getElementById('tableCount').textContent = `Mostrando ${data.length} inscripciones`;
  }

  function filterTable(){
    const q = document.getElementById('searchInput').value.toLowerCase();
    const week = document.getElementById('weekFilter').value;
    const filtered = allData.filter(r => {
      const matchQ = !q ||
        (r.child_name||'').toLowerCase().includes(q) ||
        (r.email||'').toLowerCase().includes(q) ||
        (r.school||'').toLowerCase().includes(q) ||
        (r.phone||'').includes(q);
      const matchW = !week || (r.weeks||'').includes(week);
      return matchQ && matchW;
    });
    renderTable(filtered);
  }

  function exportCSV(){
    if(!allData.length){ alert('No hay datos para exportar.'); return; }
    const headers = ['Nombre','Nacimiento','Edad','Género','Talla','Colegio','Curso','Alergias','Condición','Medicamentos','Fotos','Ant.Campista','Padre','Madre','Teléfono','Email','Iglesia','Semanas','Fecha'];
    const rows = allData.map(r => [
      r.child_name, r.birth_date, r.age, r.gender, r.shirt_size, r.school, r.next_grade,
      r.allergies, r.medical_condition, r.medications, r.photo_permission, r.previous_camper,
      r.father_name, r.mother_name, r.phone, r.email, r.church, r.weeks,
      new Date(r.created_at).toLocaleString('es-DO')
    ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`));

    const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `inscripciones_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  // Auto-refresh every 60 seconds
  setInterval(()=>{ if(!document.getElementById('app').classList.contains('hidden')) loadData(); }, 60000);
</script>
</body>
</html>
